name: Daily FinTech Signal Tracker

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: |
          python src/fetch_data.py
          python src/generate_report.py

      - name: Commit and push changes
        run: |
          git config user.name "TEHILLA-O"
          git config user.email "tehillaobanor@gmail.com"
          git add data/ reports/
          git diff --cached --quiet || git commit -m "daily fintech signal update"
          git push
